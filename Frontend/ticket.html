<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmaApp | Ticket</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header></header>
    <script src="js/header.js"></script>

    <main>
        <div id="contenedor-ticket">
            <h2>¡Gracias por tu compra!</h2>
            <div id="info-ticket">
                <p>Cliente: <span id="ticket-nombre"></span></p>
                <p>Fecha: <span id="ticket-fecha"></span></p>
            </div>
            <table id="tabla-ticket">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Cantidad</th>
                        <th>Precio unit.</th>
                        <th>Subtotal</th>
                    </tr>
                </thead>
                <tbody id="ticket-items"></tbody>
            </table>
            <p id="ticket-total"></p>
            <button id="btn-continuar">Volver al inicio</button>
        </div>
    </main>

    <script src="js/ticket.js"></script>
</body>
</html>
