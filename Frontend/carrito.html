<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmaApp | Carrito</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header></header>
    <script src="js/header.js"></script>

    <main>
        <div id="contenedor-carrito">
            <h2>Mi carrito</h2>
            <table id="tabla-carrito">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Cantidad</th>
                        <th>Precio unit.</th>
                        <th>Subtotal</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-tabla"></tbody>
            </table>
            <p id="total">Total: $0</p>
            <div id="acciones-carrito">
                <button class="btn-limpiar" id="btn-limpiar">Limpiar carrito</button>
                <button class="btn-confirmar" id="btn-confirmar">Confirmar compra</button>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/carrito.js"></script>
</body>
</html>
